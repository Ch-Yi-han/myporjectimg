{% extends 'base.html' %}
{% load static %}

{% block title %}首頁 | 聚福樓 - 正宗中式料理{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/home.css' %}">
{% endblock %}

{% block content %}
<div id="jufuCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel" data-bs-pause="false">
    <div class="carousel-inner">
        
        <div class="carousel-item active" data-bs-interval="6000">
            <img src="{% static 'images/image_7b2e94.jpg' %}" class="d-block w-100 jufu-carousel-img" alt="聚福樓尊榮店招">
            <div class="carousel-caption-custom d-flex flex-column justify-content-center align-items-center">
                <h1 class="display-2">聚福樓</h1>
                <p class="style-letter">正宗中式料理 · 蘊含宮廷千百風味</p>
            </div>
        </div>

        <div class="carousel-item" data-bs-interval="6000">
            <img src="{% static 'images/food_plate.jpg' %}" class="d-block w-100 jufu-carousel-img" alt="主廚推薦珍饈">
            <div class="carousel-caption-custom d-flex flex-column justify-content-center align-items-center">
                <h1 class="display-2">匠心獨具</h1>
                <p class="style-letter">嚴選頂級旬鮮 · 傳承火候入味</p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
