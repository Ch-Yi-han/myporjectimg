{% extends "base.html" %}
{% load static %}

{% block title %}聯絡我們{% endblock  %}
{% block extra_css %}
<link rel="stylesheet" href="{% static "css/contact_us.css" %}">
{% endblock  %}
{% block content %}


<section class="ju-contact-section">
  <div class="ju-contact-overlay"></div>
  
  <div class="ju-contact-container">
    <div class="ju-contact-card">
      <span class="ju-contact-subtitle">CONTACT US</span>
      <h2 class="ju-contact-title">聯絡我們</h2>
      
      <div class="ju-contact-info-list">
        <div class="ju-info-item">
          <div class="ju-info-icon">🕒</div>
          <div class="ju-info-text">
            <h3>營業時間</h3>
            <p>週一至週日 11:30 - 14:30 / 17:30 - 21:30</p>
          </div>
        </div>

        <div class="ju-info-item">
          <div class="ju-info-icon">📞</div>
          <div class="ju-info-text">
            <h3>訂位專線</h3>
            <p>02-123-4567</p>
          </div>
        </div>

        <div class="ju-info-item">
          <div class="ju-info-icon">📍</div>
          <div class="ju-info-text">
            <h3>餐廳地址</h3>
            <p>桃園市中壢區六福街2號</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
{% endblock %}
