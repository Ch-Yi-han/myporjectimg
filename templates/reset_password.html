<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>重設新密碼</title>
</head>
<body>
    <div style="margin: 50px auto; max-width: 400px; text-align: center;">
        <h2>設定新密碼</h2>
        
        {% if messages %}
            {% for message in messages %}
                <p style="color: red;">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 15px;">
                <input type="password" name="password" placeholder="請輸入新密碼" required style="padding: 10px; width: 100%;">
            </div>
            <div style="margin-bottom: 15px;">
                <input type="password" name="password_confirm" placeholder="請再次輸入新密碼" required style="padding: 10px; width: 100%;">
            </div>
            <button type="submit" style="padding: 10px 20px; background-color: #dc3545; color: white; border: none; cursor: pointer;">
                確認修改密碼
            </button>
        </form>
    </div>
</body>
</html>
