<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>忘記密碼</title>
</head>
<body>
    <div style="margin: 50px auto; max-width: 400px; text-align: center;">
        <h2>忘記密碼</h2>
        
        {% if messages %}
            {% for message in messages %}
                <p style="color: red;">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %} <div style="margin-bottom: 15px;">
                <input type="text" name="username" placeholder="請輸入帳號" required style="padding: 10px; width: 100%;">
            </div>
            <div style="margin-bottom: 15px;">
                <input type="email" name="email" placeholder="請輸入電子信箱" required style="padding: 10px; width: 100%;">
            </div>
            <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer;">
                發送驗證碼
            </button>
        </form>
    </div>
</body>
</html>
