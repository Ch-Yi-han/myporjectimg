{% extends "base.html" %}
{% load static %}

{% block title %}登入{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/user_login.css' %}">

<div class="login-wrapper">
  <div class="login-card">
    
    <div class="login-header">
      <h2>歡迎回來</h2>
      <p>請輸入您的帳號密碼以登入會員</p>
    </div>

    {% if error_message %}
      <div class="alert-error-container">
        <p class="error-text">⚠️ {{ error_message }}</p>
      </div>
    {% endif %}

    <form action="{% url 'user_login' %}" method="POST" class="login-form">
      {% csrf_token %}
      
      <div class="input-group">
        <div class="form-field">
          <label for="username">帳號</label>
          <input id="username" name="username" type="text" required placeholder="請輸入您的帳號">
        </div>
        
        <div class="form-field">
          <label for="password">密碼</label>
          <input id="password" name="password" type="password" required placeholder="••••••••">
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox">
          <span>記住我</span>
        </label>
        <a href="{% url "forgot_password_request" %}" class="forgot-password">忘記密碼？</a>
      </div>

      <div class="submit-block">
        <button type="submit" class="btn-submit">登入</button>
      </div>

      <div class="register-redirect">
        <p>
          沒有帳號？ <a href="{% url 'register' %}">註冊會員</a>
        </p>
      </div>
    </form>

  </div>
</div>
{% endblock %}
