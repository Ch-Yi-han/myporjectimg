{% extends "base.html" %}
{% load static %}

{% block title %}登入{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/user_login.css' %}">

<div class="min-h-screen">
  <div class="max-w-md">
    
    <div class="text-center">
      <h2 class="text-3xl">歡迎回來</h2>
      <p class="text-gray-600 text-sm">請輸入您的帳號密碼以登入會員</p>
    </div>

    <form class="space-y-6" action="#" method="POST">
      <div class="space-y-4">
        <div>
          <label for="email" class="block font-medium text-gray-700 mb-1">電子郵件 / 帳號</label>
          <input id="email" name="email" type="email" required class="appearance-none w-full px-3 py-2" placeholder="example@email.com">
        </div>
        
        <div>
          <label for="password" class="block font-medium text-gray-700 mb-1">密碼</label>
          <input id="password" name="password" type="password" required class="appearance-none w-full px-3 py-2" placeholder="••••••••">
        </div>
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center text-gray-900">
          <input type="checkbox">
          <span class="ml-2">記住我</span>
        </label>
        <a href="#" class="text-indigo-600">忘記密碼？</a>
      </div>

      <div>
        <button type="submit" class="w-full py-2">
          登入
        </button>
      </div>
      <div>
        <p class="text-center text-sm text-gray-600">
          沒有帳號？ <a href="{% url 'adduser' %}" class="text-indigo-600">註冊會員</a>
        </p>
      </div>
    </form>

  </div>
</div>
{% endblock %}
